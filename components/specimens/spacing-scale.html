<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing Scale" subtitle="8px base grid, 4 → 96px" viewport="700x170" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--brand); border-radius: 2px; width: 28px; }
  .item .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); margin-top: 6px; }
  .item .px { font-family: var(--font-latin); font-size: 10px; color: var(--fg3); }
</style></head>
<body><div class="card">
  <div class="scale">
    <div class="item"><div class="bar" style="height:4px"></div><div class="n">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">5</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">6</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="n">7</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="n">8</div><div class="px">64</div></div>
    <div class="item"><div class="bar" style="height:96px"></div><div class="n">9</div><div class="px">96</div></div>
  </div>
</div></body></html>
