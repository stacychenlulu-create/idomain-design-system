<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Corner Radii" subtitle="Architectural: 0 → 8px, pill" viewport="700x160" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { display: flex; gap: 22px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 84px; height: 84px; background: var(--idi-blue-50, #eef2fc); border: 1.5px solid var(--brand); }
  .item .n { font-family: var(--font-latin); font-size: 11px; color: var(--fg2); margin-top: 8px; font-weight: 600; }
  .item .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
</style></head>
<body><div class="card">
  <div class="item"><div class="box" style="border-radius:0"></div><div class="n">none</div><div class="px">0px</div></div>
  <div class="item"><div class="box" style="border-radius:2px"></div><div class="n">sm</div><div class="px">2px</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="n">md</div><div class="px">4px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="n">lg</div><div class="px">8px</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="n">pill</div><div class="px">999px</div></div>
</div></body></html>
