<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type Scale" subtitle="Modular ramp, 14 → 84px" viewport="700x230" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { display: flex; flex-direction: column; gap: 2px; }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--divider); padding: 5px 0; }
  .line:last-child { border-bottom: 0; }
  .tag { flex: 0 0 92px; font-family: var(--font-latin); font-size: 11px; color: var(--fg3); letter-spacing: .04em; }
  .px { flex: 0 0 46px; font-family: var(--font-mono); font-size: 11px; color: var(--brand); }
  .samp { font-family: var(--font-serif); color: var(--fg1); line-height: 1; white-space: nowrap; }
</style></head>
<body><div class="card">
  <div class="line"><span class="tag">5xl / display</span><span class="px">84</span><span class="samp" style="font-size:40px;font-weight:600">壹東 Aa</span></div>
  <div class="line"><span class="tag">3xl / h1</span><span class="px">48</span><span class="samp" style="font-size:32px;font-weight:600">壹東實業 Aa</span></div>
  <div class="line"><span class="tag">2xl / h2</span><span class="px">36</span><span class="samp" style="font-size:26px;font-weight:600">標準規範 Aa</span></div>
  <div class="line"><span class="tag">xl / h3</span><span class="px">28</span><span class="samp" style="font-size:21px;font-weight:500">複層金屬板 Aa</span></div>
  <div class="line"><span class="tag">base / body</span><span class="px">16</span><span class="samp" style="font-size:16px;font-family:var(--font-sans)">金屬帷幕牆 Body</span></div>
  <div class="line"><span class="tag">sm / caption</span><span class="px">14</span><span class="samp" style="font-size:14px;font-family:var(--font-sans);color:var(--fg3)">caption 註解</span></div>
</div></body></html>
