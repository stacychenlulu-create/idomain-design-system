<!DOCTYPE html>
<!-- @dsCard group="Type" name="Weights (self-hosted)" subtitle="Thin 100 + Black 900 + Serif ExtraLight, self-hosted OTF" viewport="700x220" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { display: flex; flex-direction: column; gap: 0; }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--divider); }
  .line:last-child { border-bottom: 0; }
  .tag { flex: 0 0 132px; font-family: var(--font-latin); font-size: 11px; color: var(--fg3); letter-spacing: .03em; }
  .tag b { color: var(--brand); }
  .s { font-family: var(--font-sans); font-size: 26px; line-height: 1.1; color: var(--fg1); }
  .se { font-family: var(--font-serif); }
</style></head>
<body><div class="card">
  <div class="line"><span class="tag"><b>100</b> Thin · 自託管</span><span class="s" style="font-weight:100">壹東實業 金屬帷幕牆</span></div>
  <div class="line"><span class="tag">400 Regular · CDN</span><span class="s" style="font-weight:400">壹東實業 金屬帷幕牆</span></div>
  <div class="line"><span class="tag">700 Bold · CDN</span><span class="s" style="font-weight:700">壹東實業 金屬帷幕牆</span></div>
  <div class="line"><span class="tag"><b>900</b> Black · 自託管</span><span class="s" style="font-weight:900">壹東實業 金屬帷幕牆</span></div>
  <div class="line"><span class="tag"><b>200</b> Serif ExtraLight</span><span class="s se" style="font-weight:200">壹東實業 精密尺寸</span></div>
</div></body></html>
