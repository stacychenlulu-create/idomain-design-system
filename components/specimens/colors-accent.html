<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Accent Colors" subtitle="Light blue + copper auxiliaries" viewport="700x152" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .sw { height: 116px; padding: 12px 14px; display: flex; flex-direction: column; justify-content: flex-end; }
  .sw .name { font-family: var(--font-latin); font-size: 12px; font-weight: 600; }
  .sw .hex { font-family: var(--font-mono); font-size: 12px; opacity: .85; }
  .sw .role { font-family: var(--font-latin); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; opacity: .75; margin-bottom: auto; }
  .light { color: #fff; }
</style></head>
<body><div class="card">
  <div class="swatches">
    <div class="sw light" style="background:#418af2"><span class="role">輔色 · Auxiliary</span><span class="name">Light Blue</span><span class="hex">#418af2</span></div>
    <div class="sw light" style="background:#d68549"><span class="role">輔色 · Accent</span><span class="name">Copper</span><span class="hex">#d68549</span></div>
  </div>
</div></body></html>
