<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { display: flex; gap: 0; padding: 0; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .g { flex: 1; height: 132px; display: flex; align-items: flex-end; padding: 12px 14px; }
  .g span { font-family: var(--font-latin); font-size: 11px; letter-spacing: .06em; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .gold { background: var(--idi-gold-gradient); }
  .gold span { color: #4a3517; text-shadow: none; }
  .blue { background: var(--idi-anniv-gradient); }
</style></head>
<body><div class="card">
  <div class="g gold"><span>Gold gradient · 漸層金</span></div>
  <div class="g blue"><span>Anniversary blue gradient · 漸層藍</span></div>
</div></body></html>
