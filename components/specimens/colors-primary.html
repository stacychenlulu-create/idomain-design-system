<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Primary Blue" subtitle="Digital #1d3eb1 + print + shades" viewport="700x152" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .sw { height: 116px; padding: 12px 14px; display: flex; flex-direction: column; justify-content: flex-end; }
  .sw .name { font-family: var(--font-latin); font-size: 12px; font-weight: 600; }
  .sw .hex { font-family: var(--font-mono); font-size: 12px; opacity: .85; }
  .sw .role { font-family: var(--font-latin); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; opacity: .7; margin-bottom: auto; }
  .light { color: #fff; }
  .dark { color: var(--idi-ink); }
</style></head>
<body><div class="card">
  <div class="swatches">
    <div class="sw light" style="background:#1d3eb1"><span class="role">數位 Digital</span><span class="name">Primary Blue</span><span class="hex">#1d3eb1</span></div>
    <div class="sw light" style="background:#324a9a"><span class="role">印刷 Print</span><span class="name">Print Blue</span><span class="hex">#324a9a</span></div>
    <div class="sw light" style="background:#16308c"><span class="role">Hover</span><span class="name">Blue 700</span><span class="hex">#16308c</span></div>
    <div class="sw light" style="background:#0f2467"><span class="role">Deep</span><span class="name">Blue 900</span><span class="hex">#0f2467</span></div>
  </div>
</div></body></html>
