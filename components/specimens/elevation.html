<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation" subtitle="Soft, cool-tinted shadows" viewport="700x140" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { display: flex; gap: 26px; align-items: center; background: var(--surface-alt); }
  .item { text-align: center; }
  .box { width: 92px; height: 70px; background: #fff; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
  .item .n { font-family: var(--font-latin); font-size: 11px; color: var(--fg2); margin-top: 12px; font-weight: 600; }
  .b-sm { box-shadow: var(--shadow-sm); }
  .b-md { box-shadow: var(--shadow-md); }
  .b-lg { box-shadow: var(--shadow-lg); }
  .b-blue { box-shadow: var(--shadow-blue); }
</style></head>
<body><div class="card">
  <div class="item"><div class="box b-sm"></div><div class="n">sm</div></div>
  <div class="item"><div class="box b-md"></div><div class="n">md</div></div>
  <div class="item"><div class="box b-lg"></div><div class="n">lg</div></div>
  <div class="item"><div class="box b-blue"></div><div class="n">blue</div></div>
</div></body></html>
