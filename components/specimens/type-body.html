<!DOCTYPE html>
<!-- @dsCard group="Type" name="Body Text" subtitle="Noto Sans TC Regular — 內文" viewport="700x150" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { display: flex; gap: 28px; }
  .meta { flex: 0 0 130px; }
  .meta .fam { font-family: var(--font-sans); font-size: 18px; font-weight: 700; }
  .meta .sub { font-family: var(--font-latin); font-size: 11px; color: var(--fg3); letter-spacing: .04em; margin-top: 4px; }
  .spec { flex: 1; }
  .body { font-family: var(--font-sans); font-weight: 400; font-size: 15px; line-height: 1.8; color: var(--fg2); max-width: 460px; }
  .latin { font-family: var(--font-latin); font-size: 13px; color: var(--fg3); margin-top: 10px; letter-spacing: .01em; }
</style></head>
<body><div class="card">
  <div class="meta">
    <div class="fam">Noto Sans TC</div>
    <div class="sub">思源黑體 · Regular<br>內文 / Body · 8–15pt</div>
  </div>
  <div class="spec">
    <p class="body">壹東實業專營複層三明治金屬板設計、製造與施工，配合客戶建築物造型之需求，生產各式精密尺寸之金屬帷幕牆。</p>
    <p class="latin">The quick brown fox jumps over the lazy dog · 0123456789</p>
  </div>
</div></body></html>
