<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { display: flex; flex-direction: column; gap: 0; padding: 0; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .cell { display: flex; align-items: center; padding: 20px 28px; border-bottom: 1px solid var(--border); }
  .cell:last-child { border-bottom: 0; }
  .cell img { height: 52px; }
  .c-white { background: #fff; }
  .c-ink { background: var(--idi-ink); }
  .c-blue { background: var(--idi-anniv-blue); }
</style></head>
<body><div class="card">
  <div class="cell c-white"><img src="assets/logo-50th-gradient.png" alt="50th gradient"></div>
  <div class="cell c-ink"><img src="assets/logo-50th-white.png" alt="50th white"></div>
</div></body></html>
