<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo Lockups" subtitle="Horizontal lockup, light + reversed" viewport="700x200" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { display: flex; flex-direction: column; gap: 0; padding: 0; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .cell { display: flex; align-items: center; padding: 22px 30px; border-bottom: 1px solid var(--border); }
  .cell:last-child { border-bottom: 0; }
  .cell img { height: 46px; }
  .c-white { background: #fff; }
  .c-ink { background: var(--idi-ink); }
</style></head>
<body><div class="card">
  <div class="cell c-white"><img src="../assets/logo-horizontal.svg" alt="horizontal lockup"></div>
  <div class="cell c-ink"><img src="../assets/logo-horizontal-white.svg" alt="horizontal lockup reversed"></div>
</div></body></html>
