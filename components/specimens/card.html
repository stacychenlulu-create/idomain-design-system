<!DOCTYPE html>
<!-- @dsCard group="Components" name="Cards" subtitle="Content card + spec stat card" viewport="700x200" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .card { background: var(--surface-alt); display: flex; gap: 18px; }
  .panel { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; width: 300px; }
  .panel .ph { height: 96px; background: linear-gradient(120deg, #1d3eb1, #16308c); position: relative; }
  .panel .ph .tag { position: absolute; left: 14px; bottom: 12px; font-family: var(--font-latin); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #fff; opacity: .85; }
  .panel .body { padding: 16px 18px; }
  .panel h4 { font-family: var(--font-serif); font-weight: 600; font-size: 19px; margin: 0 0 6px; color: var(--fg1); }
  .panel p { font-family: var(--font-sans); font-size: 13px; line-height: 1.7; color: var(--fg2); margin: 0; }
  .panel .meta { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--divider); font-family: var(--font-latin); font-size: 11px; color: var(--fg3); display: flex; justify-content: space-between; }
  .spec-card { background:#fff; border:1px solid var(--border); border-top: 3px solid var(--accent); border-radius: var(--radius-md); padding: 16px 18px; width: 200px; }
  .spec-card .k { font-family: var(--font-latin); font-size: 10px; letter-spacing:.14em; text-transform: uppercase; color: var(--accent); }
  .spec-card .v { font-family: var(--font-serif); font-size: 30px; font-weight: 600; color: var(--fg1); margin-top: 6px; }
  .spec-card .d { font-family: var(--font-sans); font-size: 12px; color: var(--fg3); margin-top: 4px; }
</style></head>
<body><div class="card">
  <div class="panel">
    <div class="ph"><span class="tag">Curtain Wall · 帷幕牆</span></div>
    <div class="body">
      <h4>複層三明治金屬板</h4>
      <p>精密尺寸金屬帷幕牆，配合建築造型，全自動化烤漆。</p>
      <div class="meta"><span>I DOMAIN</span><span>Spec →</span></div>
    </div>
  </div>
  <div class="spec-card">
    <div class="k">Paint line</div>
    <div class="v">100%</div>
    <div class="d">全自動化烤漆色彩</div>
  </div>
</div></body></html>
